# SPA fallback: every unknown path resolves to /index.html so client-side
# routing works after a hard refresh. Caddy in front handles TLS + the
# /api/* and /uploads/* proxies to the API.

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # cache hashed Vite assets aggressively
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri /index.html;
  }
}
